<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global EcoNews - Daily Top 5</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
</head>
<body>
    <div class="texture-overlay"></div>
    
    <header>
        <div class="container header-content">
            <div class="logo">
                <h1>Global <span>EcoNews</span></h1>
                <p>Top 5 Economic Insights Daily</p>
            </div>
            
            <nav class="language-picker">
                <label for="language-select">Language:</label>
                <select id="language-select">
                    <option value="ko">한국어</option>
                    <option value="en" selected>English</option>
                    <option value="ja">日本語</option>
                    <option value="zh">中文</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                </select>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="news-container" class="news-grid">
            <!-- News cards will be dynamically inserted here -->
            <div class="loading-state">
                <p>Fetching global economic updates...</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Global EcoNews. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js" type="module"></script>
</body>
</html>
