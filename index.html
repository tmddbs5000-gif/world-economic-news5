<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global EcoNews - Daily Top 5</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
</head>
<body>
    <div class="texture-overlay"></div>
    
    <header>
        <div class="container header-content">
            <div class="logo">
                <h1>Global <span>EcoNews</span></h1>
                <p>Top 5 Economic Insights Daily</p>
            </div>
            
            <nav class="controls">
                <button id="partnership-btn" class="partnership-btn">Partnership</button>
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark/light mode">
                    <span class="sun">🌞</span>
                    <span class="moon">🌙</span>
                </button>
                <div class="date-picker-wrapper">
                    <label for="date-select">Date:</label>
                    <input type="date" id="date-select" value="2026-04-13" max="2026-04-13">
                </div>
                <div class="language-picker">
                    <label for="language-select">Language:</label>
                    <select id="language-select">
                        <option value="ko" selected>한국어</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                        <option value="zh">中文</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                    </select>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="news-container" class="news-grid">
            <div class="loading-state"><p>Fetching insights...</p></div>
        </section>
    </main>

    <!-- Partnership Inquiry Modal -->
    <div id="partnership-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Partnership Inquiry</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <form action="https://formspree.io/f/your_endpoint_id" method="POST">
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email-address">Email Address</label>
                    <input type="email" id="email-address" name="_replyto" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can we collaborate?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="container"><p>&copy; 2026 Global EcoNews. All rights reserved.</p></div>
    </footer>

    <script src="main.js" type="module"></script>
</body>
</html>
